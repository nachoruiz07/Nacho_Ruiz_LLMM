<!DOCTYPE html>
<!-- Buscador de Libros -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Libros en Tiempo Real</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f9f9f9;
        }
        #buscador {
            width: 100%;
            max-width: 400px;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 6px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        ul { list-style: none; padding: 0; }
        li {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            margin: 6px 0;
        }
    </style>
</head>

        id="buscador"
        placeholder="Busca un libro..."

    >
